<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Seu Aconchego</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --purple: #7c3aed; --bg: #f8f5ff; --border: #e9e3f5; --muted: #64748b; --red: #dc2626; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 50%, #2563eb 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 24px; padding: 36px 28px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-icon { font-size: 52px; display: block; margin-bottom: 10px; }
    .logo h1 { font-family: 'Playfair Display', serif; font-size: 26px; color: #1e1b2e; }
    .logo p { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
    input { width: 100%; padding: 13px 16px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border 0.2s; }
    input:focus { border-color: var(--purple); background: #fff; }
    .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 8px; box-shadow: 0 4px 16px rgba(124,58,237,0.35); }
    .erro { background: #fee2e2; color: var(--red); border-radius: 10px; padding: 11px 14px; font-size: 14px; font-weight: 500; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">🏡</span>
      <h1>Seu Aconchego</h1>
      <p>Faça login para continuar</p>
    </div>
    {% if erro %}<div class="erro">⚠️ {{ erro }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Login</label>
        <input type="text" name="login" placeholder="Seu login" required autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn">Entrar →</button>
    </form>
  </div>
</body>
</html>
