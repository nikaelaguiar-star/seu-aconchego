<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Conta — Seu Aconchego</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --purple: #7c3aed; --bg: #f8f5ff; --card: #fff; --border: #e9e3f5; --muted: #64748b; --red: #dc2626; --green: #16a34a; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; }
    header { background: linear-gradient(135deg, #7c3aed, #4f46e5); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .back-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 8px 14px; border-radius: 10px; font-size: 14px; cursor: pointer; text-decoration: none; }
    header h1 { font-family: 'Playfair Display', serif; color: #fff; font-size: 18px; }
    .wrap { padding: 24px 16px 40px; max-width: 440px; margin: 0 auto; }
    .info-card { background: linear-gradient(135deg, #ede9fe, #e0e7ff); border-radius: 16px; padding: 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 14px; }
    .avatar { width: 52px; height: 52px; background: var(--purple); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; font-weight: 700; flex-shrink: 0; }
    .info-card h3 { font-size: 17px; font-weight: 700; color: #1e1b2e; }
    .info-card p { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .badge { display: inline-block; background: var(--purple); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 99px; margin-top: 4px; }
    .card { background: var(--card); border-radius: 16px; padding: 22px 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
    .card h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .form-group { margin-bottom: 14px; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
    input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
    input:focus { border-color: var(--purple); background: #fff; }
    .btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; font-family: 'DM Sans', sans-serif; }
    .msg-ok { background: #dcfce7; color: var(--green); border-radius: 10px; padding: 12px 14px; font-size: 14px; font-weight: 500; margin-bottom: 14px; }
    .msg-err { background: #fee2e2; color: var(--red); border-radius: 10px; padding: 12px 14px; font-size: 14px; font-weight: 500; margin-bottom: 14px; }
  </style>
</head>
<body>
<header>
  <a href="/" class="back-btn">← Voltar</a>
  <h1>Minha Conta</h1>
</header>
<div class="wrap">
  <div class="info-card">
    <div class="avatar">{{ session.usuario_nome[0].upper() }}</div>
    <div>
      <h3>{{ session.usuario_nome }}</h3>
      <span class="badge">{{ '👑 Admin' if session.perfil == 'admin' else '👤 Usuário' }}</span>
    </div>
  </div>

  <div class="card">
    <h3>🔑 Alterar Senha</h3>
    {% if msg %}<div class="msg-ok">✅ {{ msg }}</div>{% endif %}
    {% if erro %}<div class="msg-err">⚠️ {{ erro }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Senha Atual</label>
        <input type="password" name="senha_atual" placeholder="••••••••" required>
      </div>
      <div class="form-group">
        <label>Nova Senha</label>
        <input type="password" name="nova_senha" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <div class="form-group">
        <label>Confirmar Nova Senha</label>
        <input type="password" name="confirma_senha" placeholder="Repita a nova senha" required>
      </div>
      <button type="submit" class="btn">💾 Salvar Nova Senha</button>
    </form>
  </div>
</div>
</body>
</html>
